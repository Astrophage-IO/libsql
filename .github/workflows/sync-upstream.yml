name: Sync upstream (tursodatabase/libsql)

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/tursodatabase/libsql.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -gt 0 ]; then
            LATEST=$(git log upstream/main -1 --format='%h %s')
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.check.outputs.behind > 0
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          echo "branch=$BRANCH" >> "$GITHUB_ENV"

      - name: Check for merge conflicts
        if: steps.check.outputs.behind > 0
        id: conflicts
        run: |
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U > /tmp/conflicts.txt
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit merge (no conflicts)
        if: steps.check.outputs.behind > 0 && steps.conflicts.outputs.has_conflicts == 'false'
        run: git push origin "$branch"

      - name: Abort and reset (conflicts)
        if: steps.check.outputs.behind > 0 && steps.conflicts.outputs.has_conflicts == 'true'
        run: |
          git merge --abort
          git merge upstream/main -s ours --no-edit
          git push origin "$branch"

      - name: Create PR
        if: steps.check.outputs.behind > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.check.outputs.behind }}
          LATEST: ${{ steps.check.outputs.latest }}
          HAS_CONFLICTS: ${{ steps.conflicts.outputs.has_conflicts }}
        run: |
          if [ "$HAS_CONFLICTS" = "true" ]; then
            CONFLICTS=$(cat /tmp/conflicts.txt | sed 's/^/- /')
            BODY="## Upstream sync

          **$BEHIND new commits** from \`tursodatabase/libsql\`.
          Latest: \`$LATEST\`

          ### Merge conflicts detected

          The following files have conflicts that need manual resolution:
          $CONFLICTS

          This PR was created with \`-s ours\` to avoid blocking. Cherry-pick or rebase the conflicting files manually.

          ---
          *Auto-generated by sync-upstream workflow*"
          else
            BODY="## Upstream sync

          **$BEHIND new commits** from \`tursodatabase/libsql\`.
          Latest: \`$LATEST\`

          Clean merge, no conflicts.

          ---
          *Auto-generated by sync-upstream workflow*"
          fi

          gh pr create \
            --base main \
            --head "$branch" \
            --title "sync: upstream tursodatabase/libsql ($(date +%Y-%m-%d))" \
            --body "$BODY" \
            --label "upstream-sync" || echo "PR already exists"
